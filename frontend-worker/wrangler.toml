name = "scanner-frontend"
main = "src/index.js"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "*.ivond.com/*"
zone_name = "ivond.com"

[[routes]]
pattern = "ivond.com/*"
zone_name = "ivond.com"

[[routes]]
pattern = "www.ivond.com/*"
zone_name = "ivond.com"
