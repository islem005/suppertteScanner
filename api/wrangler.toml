# Dev config — connects to shelf-scanner-db-dev on Cloudflare (default)
# Run: wrangler dev --remote
# For production: wrangler deploy --config wrangler.prod.toml
name = "scanner-api"
main = "src/index.js"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
BETTER_AUTH_URL = "http://localhost:3002"
# Set via wrangler secret put BETTER_AUTH_SECRET
# BETTER_AUTH_SECRET = ""

[[r2_buckets]]
binding = "CATALOGS"
bucket_name = "store-catalogs"

[[d1_databases]]
binding = "DB"
database_name = "shelf-scanner-db-dev"
database_id = "be60b33e-892f-4dde-8b54-f097e53f552e"
