# Production deploy config — uses the production D1 database
# Run: cd api && wrangler deploy --config wrangler.prod.toml
name = "scanner-api"
main = "src/index.js"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Routes that connect the Worker to the custom domains
routes = [
  "ivond.com/api/*",
  "*.ivond.com/api/*"
]

[vars]
BETTER_AUTH_URL = "https://ivond.com"
CLOUDFLARE_ACCOUNT_ID = "c1a9c77e51deb2655ceb8700c6723f3d"

# ⚠️  Set via `wrangler secret put BETTER_AUTH_SECRET` before deploy
# BETTER_AUTH_SECRET = ""

[[r2_buckets]]
binding = "CATALOGS"
bucket_name = "store-catalogs"

[[d1_databases]]
binding = "DB"
database_name = "shelf-scanner-db"
database_id = "a6547253-cfd8-47cb-9bd0-ca61db1b6d61"


