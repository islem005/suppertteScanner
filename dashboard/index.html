<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0c0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="SKANER Dashboard by ivond — Manage your store products, branding, analytics, and scan data.">
  <meta property="og:title" content="SKANER — Dashboard">
  <meta property="og:description" content="SKANER Dashboard by ivond.">
  <meta property="og:url" content="https://ivond.com/dashboard">
  <meta property="og:type" content="website">
  <link rel="manifest" href="/dashboard/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <title>SKANER — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="../css/rtl.css">
</head>
<body>
  <div id="app">

    <!-- ═══ LAYOUT (authenticated) ═══ -->
    <div id="view-dash" class="view">

      <!-- Sidebar -->
      <div id="sidebar-backdrop" class="hidden"></div>
      <aside id="sidebar">
        <div id="sidebar-brand">
          <span id="sidebar-logo"><img src="/assets/icons/icon-192.png" alt="" class="sidebar-logo-icon"></span>
          <div id="sidebar-brand-text">
            <span id="sidebar-title">SKANER</span>
            <span id="sidebar-store-name"></span>
          </div>
          <button id="btn-sidebar-close" class="icon-btn sidebar-close-btn" aria-label="Close menu"><i data-feather="x"></i></button>
        </div>
        <nav id="sidebar-nav"></nav>
        <div id="sidebar-user">
          <span id="sidebar-username"></span>
          <button id="btn-install-dash" class="btn small" aria-label="Install App" style="display:none"><i data-feather="download"></i> Install App</button>
          <button id="btn-logout" class="btn small" data-i18n="signOut">Sign Out</button>
        </div>
      </aside>

      <!-- Mobile header -->
      <div id="mobile-header">
        <button id="btn-toggle-sidebar" class="icon-btn" aria-label="Toggle menu"><i data-feather="menu"></i></button>
        <span id="mobile-title" data-i18n="dashboard">Dashboard</span>
        <div style="width:40px"></div>
      </div>

      <!-- Main content -->
      <main id="main-content">

        <!-- ══ ADMIN: Overview ══ -->
        <section id="view-overview" class="dash-view">
          <header class="view-header"><h2 data-i18n="navOverview">Overview</h2><span id="ov-date" class="meta"></span></header>
          <div id="ov-cards" class="stats-row"></div>
          <div id="ov-store-table" class="table-wrap"></div>
        </section>

        <!-- ══ Branding ══ -->
        <section id="view-branding" class="dash-view">
          <header class="view-header"><h2 data-i18n="navBranding">Branding</h2></header>
          <div class="dash-view-inner">
            <div class="branding-column">
              <form id="branding-form" class="branding-form">
                <div class="form-row">
                  <label data-i18n="name">Display Name</label>
                  <input type="text" id="brand-name" placeholder="Store display name"><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label data-i18n="logo">Logo</label>
                  <div class="logo-picker">
                    <input type="file" id="brand-logo-input" accept="image/png,image/jpeg,image/webp">
                    <input type="hidden" id="brand-logo">
                    <img id="brand-logo-preview" class="logo-preview hidden">
                    <button id="brand-logo-remove" class="btn small hidden" type="button">Remove</button>
                  </div>
                </div>
                <div class="form-row">
                  <label data-i18n="primaryColor">Primary Color</label>
                  <div class="color-row"><input type="color" id="brand-primary" value="#6366f1"><span id="brand-primary-val">#6366f1</span></div>
                </div>
                <div class="form-row">
                  <label data-i18n="accentColor">Accent Color</label>
                  <div class="color-row"><input type="color" id="brand-accent" value="#10b981"><span id="brand-accent-val">#10b981</span></div>
                </div>
                <div class="form-row">
                  <label data-i18n="contactEmail">Contact Email</label>
                  <input type="email" id="brand-email" placeholder="store@example.com"><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label data-i18n="contactPhone">Contact Phone</label>
                  <input type="tel" id="brand-phone" placeholder="+1 555-0123"><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label data-i18n="footerText">Footer Text</label>
                  <input type="text" id="brand-footer" placeholder="© 2026 My Store"><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label>Instagram</label>
                  <input type="url" id="brand-instagram" placeholder="https://instagram.com/..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label>TikTok</label>
                  <input type="url" id="brand-tiktok" placeholder="https://tiktok.com/@..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label data-i18n="websiteUrl">Website</label>
                  <input type="url" id="brand-website" placeholder="https://..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label>Facebook</label>
                  <input type="url" id="brand-facebook" placeholder="https://facebook.com/..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label>Twitter / X</label>
                  <input type="url" id="brand-twitter" placeholder="https://twitter.com/..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                  <div class="form-row">
                  <label>YouTube</label>
                  <input type="url" id="brand-youtube" placeholder="https://youtube.com/@..."><!-- TODO: replace placeholder with actual store data -->
                  </div>
                <button type="submit" class="btn primary" data-i18n="saveBranding">Save Branding</button>
                <div id="brand-msg" class="success-msg"></div>
              </form>
            </div>

          </div>

          <!-- QR Code -->
          <div class="qr-section">
            <div class="profile-card qr-card">
              <h3 data-i18n="qrCode" style="margin:0 0 4px;font-size:16px">QR Code</h3>
              <p style="margin:0 0 12px;font-size:var(--text-sm);color:var(--text-secondary)" data-i18n="qrScanToVisit">Scan to visit your store</p>
              <div class="qr-canvas-wrap">
                <canvas id="dash-qr-canvas" width="200" height="200"></canvas>
              </div>
              <span id="dash-qr-url" class="qr-url"></span>
              <button id="btn-dash-download-qr" class="btn small" data-i18n="qrDownload" style="margin-top:12px">Download PNG</button>
            </div>
          </div>
        </section>

        <!-- ══ ADMIN: Activity ══ -->
        <section id="view-activity" class="dash-view">
          <header class="view-header"><h2 data-i18n="recentActivity">Recent Activity</h2></header>
          <div id="activity-list" class="table-wrap"></div>
        </section>

        <!-- ══ MANAGER: Products ══ -->
        <section id="view-products" class="dash-view">
          <header class="view-header"><h2 data-i18n="navProducts">Products</h2>
            <div style="display:flex;gap:8px;align-items:center;flex:1;max-width:320px;margin-left:auto">
              <div style="position:relative;flex:1">
                <i data-feather="search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-tertiary);pointer-events:none"></i>
                <input type="text" id="product-search" class="form-input" data-i18n="searchPlaceholder" placeholder="Search barcode or name..." style="padding-left:30px;font-size:var(--text-sm)">
              </div>
              <button id="btn-add-product" class="btn small" data-i18n="newProduct">+ New Product</button>
              <button id="btn-upload-csv" class="btn small" data-i18n="uploadData">Upload Data</button>
            </div>
            <input type="file" id="csv-file" accept=".csv,.xlsx,.xls,.db,.sqlite,.json" style="display:none">
          </header>
          <div id="product-list" class="table-wrap"></div>
        </section>

        <!-- ══ Offers ══ -->
        <section id="view-offers" class="dash-view">
          <header class="view-header"><h2 data-i18n="navOffers">Offers</h2><button id="btn-add-offer" class="btn small" data-i18n="newOffer">+ New Offer</button></header>
          <div id="offers-list" class="table-wrap"></div>
        </section>

        <!-- ══ Discounts ══ -->
        <section id="view-categories" class="dash-view">
          <header class="view-header"><h2 data-i18n="categories">Categories</h2><button id="btn-add-category" class="btn small" data-i18n="addCategory">+ Add Category</button></header>
          <div id="category-list" class="table-wrap"></div>
        </section>

        <section id="view-discounts" class="dash-view">
          <header class="view-header"><h2 data-i18n="navDiscounts">Discount Items</h2><button id="btn-add-discount" class="btn small" data-i18n="newDiscount">+ New Discount</button></header>
          <div id="discount-list" class="table-wrap"></div>
        </section>

        <!-- ══ Analytics ══ -->
        <section id="view-analytics" class="dash-view">
          <header class="view-header">
            <h2>Analytics</h2>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <select id="an-days-filter" class="form-input" style="width:auto;padding:var(--space-1) var(--space-3);font-size:var(--text-xs)">
                <option value="7">7 days</option>
                <option value="30" selected>30 days</option>
                <option value="90">90 days</option>
              </select>
              <button id="btn-an-export" class="btn small">Export CSV</button>
            </div>
          </header>
          <div id="an-cards" class="stats-row"></div>
          <div class="card" style="padding:var(--space-4);background:var(--bg-surface);margin-top:var(--space-4)">
            <h4 style="margin:0 0 var(--space-3);font-size:var(--text-sm)">Daily Trend</h4>
            <div id="an-trend-chart" style="min-height:140px"></div>
          </div>
          <div class="card" style="padding:var(--space-4);background:var(--bg-surface);margin-top:var(--space-4)">
            <h4 style="margin:0 0 var(--space-3);font-size:var(--text-sm)">Top Scanned Products</h4>
            <div id="an-top-products" class="table-wrap"></div>
          </div>
        </section>

        <!-- ══ Team (manager only) ══ -->
        <section id="view-team" class="dash-view">
          <header class="view-header"><h2 data-i18n="navTeam">Team</h2><button id="btn-add-associate" class="btn small" data-i18n="newAssociate">+ New Associate</button></header>
          <div id="team-list" class="table-wrap"></div>
        </section>

        <!-- ══ Audit Log (manager only) ══ -->
        <section id="view-audit" class="dash-view">
          <header class="view-header"><h2 data-i18n="navAuditLog">Audit Log</h2></header>
          <div id="audit-list" class="table-wrap"></div>
        </section>

        <!-- ══ Profile ══ -->
        <section id="view-profile" class="dash-view">
          <header class="view-header"><h2 data-i18n="myProfile">My Profile</h2></header>
          <div class="profile-card">
            <div class="form-row"><label data-i18n="email">Email</label><span id="prof-email"></span></div>
            <div class="form-row"><label data-i18n="name">Name</label><span id="prof-name"></span></div>
            <div class="form-row"><label data-i18n="role">Role</label><span id="prof-role" class="tag"></span></div>
            <div class="form-row"><label data-i18n="store">Store</label><span id="prof-store"></span></div>
          </div>
          <div class="profile-card lang-section" style="margin-top:var(--space-4)">
            <div class="form-row"><label data-i18n="language">Language</label>
              <div class="lang-selector">
                <button class="lang-btn" data-lang="en" data-i18n="english">English</button>
                <button class="lang-btn" data-lang="fr" data-i18n="french">Fran&ccedil;ais</button>
                <button class="lang-btn" data-lang="ar" data-i18n="arabic">العربية</button>
              </div>
            </div>
          </div>
          <div class="profile-card" style="margin-top:var(--space-4)">
            <div class="form-row"><label data-i18n="changePassword">Change Password</label>
              <div class="password-change-form" style="display:flex;flex-direction:column;gap:8px">
                <input type="password" id="prof-current-pass" class="form-input" placeholder="Current password">
                <input type="password" id="prof-new-pass" class="form-input" placeholder="New password (min 6 chars)">
                <button id="btn-change-pass" class="btn small" data-i18n="updatePassword">Update Password</button>
                <span id="prof-pass-msg" style="font-size:var(--text-xs)"></span>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- ═══ MODALS ═══ -->
    <div id="modal-overlay" class="hidden" onclick="closeModal(event)">
      <div id="modal-box" role="dialog" aria-modal="true">
        <div id="modal-body"></div>
        <div class="modal-actions"><button class="btn small" onclick="closeModal()" aria-label="Close" data-i18n="cancel">Cancel</button><button id="modal-confirm" class="btn primary" type="button" data-i18n="confirm">Confirm</button></div>
      </div>
    </div>

  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/scanner-core.js"></script>
  <script src="../js/scanner.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
