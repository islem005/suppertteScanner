<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0c0d">
  <title>Shelf Scanner - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ═══ LAYOUT (authenticated) ═══ -->
    <div id="view-dash" class="view">

      <!-- Sidebar -->
      <div id="sidebar-backdrop" class="hidden"></div>
      <aside id="sidebar">
        <div id="sidebar-brand">
          <span id="sidebar-logo"><i data-feather="bar-chart-2"></i></span>
          <span id="sidebar-title">Shelf Scanner</span>
          <button id="btn-sidebar-close" class="icon-btn sidebar-close-btn" aria-label="Close menu"><i data-feather="x"></i></button>
        </div>
        <nav id="sidebar-nav"></nav>
        <div id="sidebar-user">
          <span id="sidebar-username"></span>
          <button id="btn-logout" class="btn small">Sign Out</button>
        </div>
      </aside>

      <!-- Mobile header -->
      <div id="mobile-header">
        <button id="btn-toggle-sidebar" class="icon-btn" aria-label="Toggle menu"><i data-feather="menu"></i></button>
        <span id="mobile-title">Dashboard</span>
        <div style="width:40px"></div>
      </div>

      <!-- Main content -->
      <main id="main-content">

        <!-- ══ ADMIN: Overview ══ -->
        <section id="view-overview" class="dash-view">
          <header class="view-header"><h2>Overview</h2><span id="ov-date" class="meta"></span></header>
          <div id="ov-cards" class="stats-row"></div>
          <div id="ov-store-table" class="table-wrap"></div>
        </section>

        <!-- ══ Branding ══ -->
        <section id="view-branding" class="dash-view">
          <header class="view-header"><h2>Branding</h2></header>
          <div class="dash-view-inner">
            <div class="branding-column">
              <form id="branding-form" class="branding-form">
                <div class="form-row">
                  <label>Display Name</label>
                  <input type="text" id="brand-name" placeholder="Store display name"><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Logo</label>
                  <div class="logo-picker">
                    <input type="file" id="brand-logo-input" accept="image/png,image/jpeg,image/webp">
                    <input type="hidden" id="brand-logo">
                    <img id="brand-logo-preview" class="logo-preview hidden">
                    <button id="brand-logo-remove" class="btn small hidden" type="button">Remove</button>
                  </div>
                </div>
                <div class="form-row">
                  <label>Primary Color</label>
                  <div class="color-row"><input type="color" id="brand-primary" value="#6366f1"><span id="brand-primary-val">#6366f1</span></div>
                </div>
                <div class="form-row">
                  <label>Accent Color</label>
                  <div class="color-row"><input type="color" id="brand-accent" value="#10b981"><span id="brand-accent-val">#10b981</span></div>
                </div>
                <div class="form-row">
                  <label>Contact Email</label>
                  <input type="email" id="brand-email" placeholder="store@example.com"><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Contact Phone</label>
                  <input type="tel" id="brand-phone" placeholder="+1 555-0123"><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Footer Text</label>
                  <input type="text" id="brand-footer" placeholder="© 2026 My Store"><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Instagram URL</label>
                  <input type="url" id="brand-instagram" placeholder="https://instagram.com/..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>TikTok URL</label>
                  <input type="url" id="brand-tiktok" placeholder="https://tiktok.com/@..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Website URL</label>
                  <input type="url" id="brand-website" placeholder="https://..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Facebook URL</label>
                  <input type="url" id="brand-facebook" placeholder="https://facebook.com/..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>Twitter / X URL</label>
                  <input type="url" id="brand-twitter" placeholder="https://twitter.com/..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <div class="form-row">
                  <label>YouTube URL</label>
                  <input type="url" id="brand-youtube" placeholder="https://youtube.com/@..."><!-- TODO: replace placeholder with actual store data -->
                </div>
                <button type="submit" class="btn primary">Save Branding</button>
                <div id="brand-msg" class="success-msg"></div>
              </form>
            </div>
            <div class="branding-column brand-preview">
              <div class="phone-mockup" id="brand-mockup">
                <div class="phone-notch"></div>
                <div class="phone-screen">
                  <div class="phone-topbar">
                    <span class="phone-title" id="preview-title">Shelf Scanner</span>
                  </div>
                  <div class="phone-scan-area">
                    <div class="phone-scan-frame">
                      <div class="phone-corner phone-corner-tl"></div>
                      <div class="phone-corner phone-corner-tr"></div>
                      <div class="phone-corner phone-corner-bl"></div>
                      <div class="phone-corner phone-corner-br"></div>
                      <div class="phone-scan-line"></div>
                    </div>
                  </div>
                  <div class="phone-result-overlay" id="preview-result">
                    <div class="phone-result-name" id="preview-result-name">Organic Honey</div>
                    <div class="phone-result-price" id="preview-result-price">$9.99</div>
                  </div>
                  <div class="phone-profile">
                    <div class="phone-profile-avatar"><img id="preview-logo" src="" alt=""></div>
                    <div class="phone-profile-name" id="preview-profile-name">Your Store</div>
                    <div class="phone-profile-links">
                      <a id="preview-instagram" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
                      <a id="preview-tiktok" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg></a>
                      <a id="preview-website" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></a>
                      <a id="preview-email" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></a>
                      <a id="preview-phone" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>
                      <a id="preview-facebook" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
                      <a id="preview-twitter" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16zM4 20l6.768 -6.768M17.232 4.768l-3.675 3.675"/></svg></a>
                      <a id="preview-youtube" class="phone-profile-link hidden"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg></a>
                    </div>
                  </div>
                  <div class="phone-bottom-controls">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    <span class="phone-counter">03</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                  </div>
                </div>
              </div>
              <div class="preview-label">Live Preview</div>
            </div>
          </div>
        </section>

        <!-- ══ ADMIN: Activity ══ -->
        <section id="view-activity" class="dash-view">
          <header class="view-header"><h2>Recent Activity</h2></header>
          <div id="activity-list" class="table-wrap"></div>
        </section>

        <!-- ══ MANAGER: Products ══ -->
        <section id="view-products" class="dash-view">
          <header class="view-header"><h2>Products</h2>
            <div style="display:flex;gap:8px;align-items:center;flex:1;max-width:320px;margin-left:auto">
              <div style="position:relative;flex:1">
                <i data-feather="search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-tertiary);pointer-events:none"></i>
                <input type="text" id="product-search" class="form-input" placeholder="Search barcode or name..." style="padding-left:30px;font-size:var(--text-sm)">
              </div>
              <button id="btn-upload-csv" class="btn small">Upload Data</button>
            </div>
            <input type="file" id="csv-file" accept=".csv,.xlsx,.xls,.db,.sqlite,.json" style="display:none">
          </header>
          <div id="product-list" class="table-wrap"></div>
        </section>

        <!-- ══ Offers ══ -->
        <section id="view-offers" class="dash-view">
          <header class="view-header"><h2>Offers</h2><button id="btn-add-offer" class="btn small">+ New Offer</button></header>
          <div id="offers-list" class="table-wrap"></div>
        </section>

        <!-- ══ Discounts ══ -->
        <section id="view-discounts" class="dash-view">
          <header class="view-header"><h2>Discount Items</h2><button id="btn-add-discount" class="btn small">+ New Discount</button></header>
          <div id="discount-list" class="table-wrap"></div>
        </section>

        <!-- ══ Profile ══ -->
        <section id="view-profile" class="dash-view">
          <header class="view-header"><h2 data-i18n="myProfile">My Profile</h2></header>
          <div class="profile-card">
            <div class="form-row"><label data-i18n="email">Email</label><span id="prof-email"></span></div>
            <div class="form-row"><label data-i18n="name">Name</label><span id="prof-name"></span></div>
            <div class="form-row"><label data-i18n="role">Role</label><span id="prof-role" class="tag"></span></div>
            <div class="form-row"><label data-i18n="store">Store</label><span id="prof-store"></span></div>
          </div>
          <div class="profile-card lang-section" style="margin-top:var(--space-4)">
            <div class="form-row"><label data-i18n="language">Language</label>
              <div class="lang-selector">
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="fr">Fran&ccedil;ais</button>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- ═══ MODALS ═══ -->
    <div id="modal-overlay" class="hidden" onclick="closeModal(event)">
      <div id="modal-box">
        <div id="modal-body"></div>
        <div class="modal-actions"><button class="btn small" onclick="closeModal()">Cancel</button><button id="modal-confirm" class="btn primary" type="button">Confirm</button></div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script src="../js/shared.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
