# ─── Shelf Scanner Deploy Pipeline ────────────────────────────────────────
# Build → Deploy Frontend + Backend → Run Full Test Suite Against Live URL
# ──────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # These must be set as secrets in GitHub repo settings
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  # Test config — overridable via secrets
  API_BASE: ${{ secrets.API_BASE || 'https://ivond.com/api' }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'admin@store.com' }}
  ADMIN_PASS: ${{ secrets.ADMIN_PASS || 'admin123' }}
  ORIGIN: ${{ secrets.ORIGIN || 'https://ivond.com' }}

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Deploy Frontend to Cloudflare Worker (Workers Assets) ──
      - name: Build + copy frontend to Worker public/
        run: node build-frontend.mjs

      - name: Deploy frontend Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
          workingDirectory: frontend-worker

      # ── Deploy Backend to Cloudflare Workers ──
      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Deploy backend to Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.prod.toml
          workingDirectory: api

      # ── Security Audit ──
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Wait for deployment to propagate ──
      # Use workers.dev URL to bypass Cloudflare WAF challenges on CI runners
      - name: Warm up — wait for health check
        run: |
          HEALTH_URL="${WORKERS_DEV_URL:-https://scanner-api.islemhassini.workers.dev/api/health}"
          for i in $(seq 1 12); do
            CODE=$(curl -sL -o /tmp/health-resp.txt -w "%{http_code}" "$HEALTH_URL")
            if [ "$CODE" = "200" ]; then echo "API ready"; exit 0; fi
            echo "Attempt $i/12 @ $HEALTH_URL: HTTP $CODE"
            sleep 10
          done
          echo "API not ready after ~120s"
          exit 1

      # ── Run Full Test Suite Against Live URL ──
      # Use workers.dev URL to bypass Cloudflare WAF challenges on CI runners
      - name: Run integration tests (against deployed API)
        run: npx vitest run --reporter=verbose
        env:
          API_BASE: https://scanner-api.islemhassini.workers.dev/api
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASS: ${{ env.ADMIN_PASS }}
          ORIGIN: ${{ env.ORIGIN }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deploy succeeded but tests failed. Check the logs above."

      - name: Rollback on test failure
        if: failure()
        run: |
          echo "Tests failed. Rolling back deployment..."
          # The previous version is still live since deploy succeeded.
          # This step prevents the pipeline from being marked green.
          exit 1
