<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — SKANER</title>
  <style>
    body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0c0c0d; color: #e4e4e7; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; text-align: center; gap: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin: 0; }
    p { color: #a1a1aa; margin: 0; font-size: 14px; line-height: 1.5; }
    .icon { width: 64px; height: 64px; border-radius: 16px; background: #6366f1; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .btn { display: inline-block; padding: 10px 24px; background: #6366f1; color: #fff; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>SKANER needs an internet connection to scan products.<br>Check your connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
