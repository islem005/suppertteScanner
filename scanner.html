<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Shelf Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Scanner View -->
    <div id="scanner-view">
      <video id="scanner" autoplay playsinline muted></video>
      <div id="overlay">
        <div id="scan-frame">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div id="scan-line"></div>
        </div>
        <div id="scan-hint">Point camera at barcode</div>
      </div>

      <!-- Scan Result Overlay -->
      <div id="result-overlay" class="hidden">
        <div id="result-name"></div>
        <div id="result-price"></div>
      </div>

      <!-- Top bar -->
      <div id="top-bar">
        <span id="title">Ivond Scanner</span>
        <button id="btn-install" class="icon-btn hidden" aria-label="Install App"><i data-feather="download"></i></button>
      </div>

      <!-- Store Profile (populated from branding) -->
      <div id="store-profile" class="hidden">
        <div id="profile-avatar" class="hidden"><img id="profile-logo" src="" alt="Store logo"></div>
        <div id="profile-name"></div>
        <div id="profile-links">
          <a id="profile-instagram" class="profile-link hidden" target="_blank" rel="noopener" aria-label="Instagram"><i data-feather="camera"></i></a>
          <a id="profile-tiktok" class="profile-link hidden" target="_blank" rel="noopener" aria-label="TikTok"><i data-feather="music"></i></a>
          <a id="profile-website" class="profile-link hidden" target="_blank" rel="noopener" aria-label="Website"><i data-feather="globe"></i></a>
          <a id="profile-email" class="profile-link hidden" aria-label="Email"><i data-feather="mail"></i></a>
          <a id="profile-phone" class="profile-link hidden" aria-label="Call"><i data-feather="phone"></i></a>
        </div>
      </div>

      <!-- Bottom controls -->
      <div id="controls">
        <button id="btn-torch" class="icon-btn" aria-label="Toggle flash"><i data-feather="zap"></i></button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="js/shared.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
