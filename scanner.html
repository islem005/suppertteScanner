<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="SKANER by ivond — instant barcode scanning. Point your camera at any barcode to see product names and prices.">
  <meta property="og:title" content="SKANER by ivond">
  <meta property="og:description" content="SKANER by ivond — instant barcode scanning. Point your camera at any barcode to see product names and prices.">
  <meta property="og:url" content="https://ivond.com">
  <meta property="og:type" content="website">
  <title>SKANER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link id="manifest-link" rel="manifest" href="/manifest.json">
  <script>!function(){var h=location.hostname,s=location.pathname.replace(/\/+$/,'').replace(/^\//,''),link=document.getElementById('manifest-link');if(h.endsWith('.ivond.com')&&h!=='ivond.com'&&!h.startsWith('admin.')&&!h.startsWith('www.')){link.href='/api/manifest?slug='+encodeURIComponent(h.split('.')[0])}else{var r=['','index.html','scanner.html','scanner','dashboard','admin','auth'];if(!h.startsWith('www.')&&s&&!r.includes(s)&&!s.startsWith('dashboard')&&!s.startsWith('admin')&&!s.startsWith('auth'))link.href='/api/manifest?slug='+encodeURIComponent(s)}}()</script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#app" class="skip-link" style="position:absolute;top:-999px;left:0;padding:8px 16px;background:#6366f1;color:#fff;z-index:99999;text-decoration:none">Skip to content</a>
  <div id="app">

    <!-- Profile bar -->
    <div id="profile-bar">
      <div id="profile-avatar" class="avatar-ring hidden">
        <div class="avatar-inner">
          <img id="profile-logo" src="" alt="Store logo">
        </div>
      </div>
      <div id="profile-info">
        <div id="profile-name"></div>
        <a id="profile-brand" href="https://ivond.com" target="_blank" rel="noopener">SKANER by ivond</a>
        <div id="profile-links">
          <a id="profile-instagram" class="p-link hidden" target="_blank" rel="noopener" aria-label="Instagram"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
          <a id="profile-tiktok" class="p-link hidden" target="_blank" rel="noopener" aria-label="TikTok"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg></a>
          <a id="profile-website" class="p-link hidden" target="_blank" rel="noopener" aria-label="Website"><i data-feather="globe"></i></a>
          <a id="profile-email" class="p-link hidden" aria-label="Email"><i data-feather="mail"></i></a>
          <a id="profile-phone" class="p-link hidden" aria-label="Call"><i data-feather="phone"></i></a>
          <a id="profile-facebook" class="p-link hidden" target="_blank" rel="noopener" aria-label="Facebook"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
          <a id="profile-twitter" class="p-link hidden" target="_blank" rel="noopener" aria-label="Twitter"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16zM4 20l6.768 -6.768M17.232 4.768l-3.675 3.675"/></svg></a>
          <a id="profile-youtube" class="p-link hidden" target="_blank" rel="noopener" aria-label="YouTube"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg></a>
        </div>
      </div>
      <button id="btn-install" class="install-btn" aria-label="Install App"><i data-feather="download"></i></button>
    </div>

    <!-- Banner / Carousel -->
    <div id="banner-area">
      <div id="banner-carousel" class="swiper hidden">
        <div class="swiper-wrapper" id="banner-track"></div>
        <div class="swiper-pagination" id="banner-dots"></div>
      </div>
      <div id="banner-fallback" class="hidden">
        <span id="banner-text"></span>
      </div>
    </div>

    <!-- Camera feed (full-width, 20%) -->
    <div id="camera-feed">
      <video id="scanner" autoplay playsinline muted></video>
      <div id="cam-overlay">
        <div id="cam-name" class="hint">Point camera at barcode</div>
        <div id="cam-price"></div>
      </div>
      <button id="btn-refresh" class="cam-refresh-btn" aria-label="Refresh camera">
        <i data-feather="refresh-cw"></i>
      </button>
    </div>


    <!-- Promo card (image + torch) -->
    <div id="promo-card">
      <div id="promo-content" class="hidden">
        <div id="promo-image-wrap">
          <img id="promo-image" alt="Promotion">
        </div>
      </div>
    </div>

    <!-- Discounts -->
    <div id="discount-area" class="hidden">
      <div id="discount-track" class="swiper">
        <div class="swiper-wrapper" id="discount-wrapper"></div>
        <div id="discount-dots"></div>
      </div>
    </div>

  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="js/shared.js"></script>
  <script src="js/scanner-core.js"></script>
  <script src="js/scanner.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
