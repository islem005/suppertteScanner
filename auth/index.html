<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c0d">
  <title>Shelf Scanner — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="auth-card">
      <div class="auth-logo"><i data-feather="camera"></i></div>
      <h1>Shelf Scanner</h1>

      <div class="login-header">
        <p>Sign in to your store dashboard</p>
      </div>

      <form id="login-form" class="auth-form active" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@store.com" required autocomplete="email"><!-- placeholder is example text -->
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password"><!-- placeholder is example text -->
        </div>
        <button type="submit" class="btn primary btn-block">Sign In</button>
        <div id="login-error" class="error-msg"></div>
      </form>

      <div class="auth-footer">
        <a href="/">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
